<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriSib Admin — Leads Târg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:     #0A2363;
  --navy-mid: #1B2A4A;
  --navy-lt:  #2A3F6F;
  --gold:     #C5A021;
  --gold-lt:  #FFF8E0;
  --pearl:    #F8FAFC;
  --white:    #ffffff;
  --border:   #E2E8F0;
  --border-dk:#CBD5E1;
  --text:     #1E2A3A;
  --muted:    #64748B;
  --admin-bg: #FFFDF5;
  --admin-bd: #EDE3B4;

  --s-nou:         #2563EB;
  --s-contactat:   #D97706;
  --s-interesat:   #059669;
  --s-neinteresat: #6B7280;
  --s-client:      #7C3AED;
  --s-arhivat:     #DC2626;
}

* { margin:0; padding:0; box-sizing:border-box; }

/* ── LAYOUT: body = coloană full-height, fără scroll propriu ── */
html { height: 100%; }
body {
  height: 100%;
  display: flex;
  flex-direction: column;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  background: var(--pearl);
  overflow: hidden;
}

/* ════════════════════════════════════════
   TOPBAR
════════════════════════════════════════ */
.topbar {
  flex-shrink: 0;
  background: var(--navy);
  height: 56px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(10,35,99,0.3);
  z-index: 200;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.topbar-logo {
  height: 34px;
  width: auto;
  /* logo are bg navy → se contopește perfect */
}

.topbar-divider {
  width: 1px;
  height: 24px;
  background: rgba(255,255,255,0.2);
}

.topbar-label {
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.02em;
}

.topbar-sub {
  font-size: 10.5px;
  color: rgba(255,255,255,0.45);
  margin-top: 1px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.badge {
  background: rgba(197,160,33,0.2);
  border: 1px solid rgba(197,160,33,0.4);
  color: #F5D060;
  border-radius: 20px;
  padding: 3px 12px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
}

.btn-topbar {
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.2);
  color: white;
  padding: 6px 14px;
  border-radius: 7px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 12.5px;
  font-weight: 500;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.btn-topbar:hover { background: rgba(255,255,255,0.2); }

/* ════════════════════════════════════════
   FILTER BAR
════════════════════════════════════════ */
.filterbar {
  flex-shrink: 0;
  background: var(--white);
  border-bottom: 1.5px solid var(--border);
  padding: 10px 20px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
  max-width: 320px;
}

.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--muted);
}

.search-wrap input {
  width: 100%;
  padding: 8px 10px 8px 34px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--navy); }
.search-wrap input::placeholder { color: #B0BEC5; }

.flt-select {
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  font-size: 12.5px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background: var(--white);
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}
.flt-select:focus { border-color: var(--navy); }

.flt-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
}

.col-toggle-btn {
  margin-left: auto;
  background: var(--gold-lt);
  border: 1.5px solid var(--admin-bd);
  color: var(--navy);
  padding: 7px 13px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.col-toggle-btn:hover { background: #FFF0B0; }

/* ════════════════════════════════════════
   STATS ROW
════════════════════════════════════════ */
.stats-row {
  flex-shrink: 0;
  display: flex;
  gap: 1px;
  background: var(--border);
  border-bottom: 1.5px solid var(--border);
}

.stat-box {
  flex: 1;
  background: var(--white);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.stat-label { font-size: 11px; color: var(--muted); }
.stat-value { font-size: 15px; font-weight: 700; color: var(--text); margin-left: auto; font-family: 'DM Mono', monospace; }

/* ════════════════════════════════════════
   TABLE ZONE — preia tot spațiul rămas
════════════════════════════════════════ */
.table-zone {
  flex: 1;
  overflow: auto;          /* SCROLL pe ambele axe */
  padding: 16px 20px 24px;
  -webkit-overflow-scrolling: touch;
}

/* Scrollbar stilizat */
.table-zone::-webkit-scrollbar { width: 8px; height: 8px; }
.table-zone::-webkit-scrollbar-track { background: var(--pearl); }
.table-zone::-webkit-scrollbar-thumb { background: var(--border-dk); border-radius: 4px; }
.table-zone::-webkit-scrollbar-thumb:hover { background: var(--muted); }

.table-card {
  background: var(--white);
  border-radius: 12px;
  box-shadow: 0 2px 16px rgba(10,35,99,0.07);
  overflow: hidden;
  min-width: 1100px; /* garantează scroll pe desktop când e prea îngust */
}

/* ── TABLE ── */
table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

/* Lățimi fixe coloane */
col.c-id       { width: 74px;  }
col.c-data     { width: 110px; }
col.c-nume     { width: 130px; }
col.c-contact  { width: 150px; }
col.c-obiectiv { width: 160px; }
col.c-interese { width: 150px; }
col.c-urg      { width: 58px;  }
col.c-buget    { width: 110px; }
col.c-status   { width: 130px; }
col.c-nivel    { width: 130px; }
col.c-rec      { width: 160px; }
col.c-followup { width: 120px; }
col.c-obs      { width: 180px; }

thead {
  position: sticky;
  top: 0;
  z-index: 10;
}

.thead-participant th {
  background: var(--navy);
  color: rgba(255,255,255,0.75);
  padding: 9px 10px;
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
  border-right: 1px solid var(--navy-lt);
}

.thead-participant th:last-child { border-right: none; }

/* Separator vizual între zona participant și zona admin */
.thead-participant th.admin-start {
  background: var(--navy-mid);
  border-left: 3px solid var(--gold);
  color: #F5D060;
}

th.sortable { cursor: pointer; }
th.sortable:hover { color: #fff; }
th.sorted-asc::after  { content: ' ↑'; color: var(--gold); }
th.sorted-desc::after { content: ' ↓'; color: var(--gold); }

td {
  padding: 10px 10px;
  border-bottom: 1px solid #F1F5F9;
  vertical-align: middle;
  font-size: 12.5px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

td.wrap { white-space: normal; }

tr:last-child td { border-bottom: none; }
tr:hover td      { background: #F0F6FF !important; }

/* Coloane admin */
td.admin-col {
  background: var(--admin-bg) !important;
  border-left-color: var(--admin-bd);
}
td.admin-col:first-of-type {
  border-left: 3px solid var(--gold);
}
tr:hover td.admin-col { background: #FFF8DC !important; }

/* ── CELL STYLES ── */
.cell-id {
  font-family: 'DM Mono', monospace;
  font-size: 10.5px;
  color: var(--navy);
  background: rgba(10,35,99,0.06);
  padding: 2px 6px;
  border-radius: 4px;
  display: inline-block;
}

.cell-name { font-weight: 600; }

.cell-contact a {
  display: block;
  color: var(--navy-mid);
  text-decoration: none;
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cell-contact a:hover { text-decoration: underline; color: var(--navy); }

.urgenta-badge {
  font-weight: 700;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
}
.urg-1, .urg-2 { color: #059669; }
.urg-3         { color: #D97706; }
.urg-4, .urg-5 { color: #DC2626; }

/* ── STATUS PILL ── */
.s-pill {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.s-Nou          { background:#EFF6FF; color:var(--s-nou); }
.s-Contactat    { background:#FFFBEB; color:var(--s-contactat); }
.s-Interesat    { background:#ECFDF5; color:var(--s-interesat); }
.s-Neinteresat  { background:#F3F4F6; color:var(--s-neinteresat); }
.s-Client       { background:#F5F3FF; color:var(--s-client); }
.s-Arhivat      { background:#FEF2F2; color:var(--s-arhivat); }

/* ── INLINE EDIT ── */
.ie-select, .ie-input, .ie-date, .ie-textarea {
  width: 100%;
  border: 1.5px solid transparent;
  border-radius: 6px;
  padding: 4px 7px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12.5px;
  background: transparent;
  outline: none;
  transition: all 0.15s;
  color: var(--text);
}
.ie-select:hover, .ie-input:hover,
.ie-date:hover,  .ie-textarea:hover {
  border-color: var(--admin-bd);
  background: #FFFEF7;
}
.ie-select:focus, .ie-input:focus,
.ie-date:focus,  .ie-textarea:focus {
  border-color: var(--gold);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(197,160,33,0.15);
}
.ie-textarea {
  resize: vertical;
  min-height: 44px;
  white-space: normal;
}

/* ── LOADING / EMPTY ── */
.state-row td {
  text-align: center;
  padding: 60px;
  color: var(--muted);
  font-size: 14px;
}

.spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--navy);
  color: white;
  padding: 9px 16px;
  border-radius: 9px;
  font-size: 12.5px;
  font-weight: 500;
  display: none;
  box-shadow: 0 6px 20px rgba(10,35,99,0.3);
  z-index: 999;
  animation: toastIn 0.25s ease;
  border-left: 3px solid var(--gold);
}
@keyframes toastIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ════════════════════════════════════════
   RESPONSIVE — mobil: layout normal cu scroll
════════════════════════════════════════ */
@media (max-width: 768px) {
  html, body { overflow: auto; height: auto; }
  .table-zone { overflow-x: auto; padding: 10px 12px; flex: none; }
  .stats-row  { display: none; }
  .topbar     { padding: 0 12px; }
  .filterbar  { padding: 8px 12px; }
  .col-toggle-btn { display: none; }
  .topbar-logo { height: 26px; }
}
</style>

<script>
let allData   = [];
let sortField = 'data';
let sortDir   = 'desc';
let adminColsVisible = true;

/* ══ AUTH ══ */
function checkAuth() {
  if (sessionStorage.getItem('ns_auth') === ADMIN_PASSWORD) return true;
  const input = prompt('🔐 Parolă admin NutriSib:');
  if (input === ADMIN_PASSWORD) {
    sessionStorage.setItem('ns_auth', input);
    return true;
  }
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#64748B">Acces restricționat.</div>';
  return false;
}

/* ══ LOAD ══ */
async function loadData() {
  if (!checkAuth()) return;
  setLoading(true);
  try {
    const res  = await fetch(APPS_SCRIPT_URL + '?action=getAll&t=' + Date.now());
    const json = await res.json();
    allData = json.data || [];
    updateStats(allData);
    filterRows();
    document.getElementById('badgeTotal').textContent = allData.length + ' leads';
  } catch(e) {
    document.getElementById('tableBody').innerHTML =
      '<tr class="state-row"><td colspan="13">⚠️ Eroare la încărcare. Verifică URL-ul Apps Script și reîncarcă.</td></tr>';
  }
  setLoading(false);
}

function setLoading(on) {
  if (on)
    document.getElementById('tableBody').innerHTML =
      '<tr class="state-row"><td colspan="13"><span class="spinner"></span> Se încarcă…</td></tr>';
}

/* ══ STATS ══ */
function updateStats(rows) {
  const count = k => rows.filter(r => (r.status||'Nou') === k).length;
  document.getElementById('sNou').textContent       = count('Nou');
  document.getElementById('sInteresat').textContent = count('Interesat');
  document.getElementById('sContactat').textContent = count('Contactat');
  document.getElementById('sClient').textContent    = count('Client');
  document.getElementById('sUrgent').textContent    = rows.filter(r => parseInt(r.urgenta) >= 4).length;
  document.getElementById('sTotal').textContent     = rows.length;
}

/* ══ FILTER + SORT ══ */
function filterRows() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const urgMin = parseInt(document.getElementById('filterUrgenta').value) || 0;
  const obiect = document.getElementById('filterObiectiv').value;

  let rows = allData.filter(r => {
    if (q && ![(r.nume||''),(r.tel||''),(r.email||''),(r.mesaj||'')]
               .some(v => v.toLowerCase().includes(q))) return false;
    if (status && (r.status||'Nou') !== status) return false;
    if (urgMin && parseInt(r.urgenta) < urgMin) return false;
    if (obiect && r.obiectiv !== obiect) return false;
    return true;
  });

  // Sort
  rows.sort((a,b) => {
    let va = a[sortField] || '', vb = b[sortField] || '';
    if (sortField === 'urgenta') { va = parseInt(va)||0; vb = parseInt(vb)||0; }
    if (va < vb) return sortDir === 'asc' ?  -1 : 1;
    if (va > vb) return sortDir === 'asc' ?   1 : -1;
    return 0;
  });

  renderTable(rows);
  updateStats(rows);
}

function sortBy(field) {
  if (sortField === field) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortField = field; sortDir = 'desc'; }
  document.querySelectorAll('th.sorted-asc, th.sorted-desc')
          .forEach(th => { th.classList.remove('sorted-asc','sorted-desc'); });
  event.currentTarget.classList.add('sorted-' + sortDir);
  filterRows();
}

/* ══ RENDER ══ */
function renderTable(rows) {
  const tbody = document.getElementById('tableBody');
  if (!rows.length) {
    tbody.innerHTML = '<tr class="state-row"><td colspan="13">Nicio înregistrare. Datele apar după prima completare a formularului.</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const statusVal = r.status || 'Nou';
    const urg = parseInt(r.urgenta) || 0;
    const admVis = adminColsVisible ? '' : 'style="display:none"';

    return `<tr data-id="${r.id}">
      <td><span class="cell-id">${r.id||'—'}</span></td>
      <td style="font-size:11.5px;color:var(--muted)">${(r.data||'').replace(' ','&nbsp;')}</td>
      <td class="cell-name">${esc(r.nume)||'—'}</td>
      <td class="cell-contact">
        ${r.tel   ? `<a href="tel:${r.tel}">📞 ${r.tel}</a>`   : ''}
        ${r.email ? `<a href="mailto:${r.email}" title="${r.email}">✉️ ${shortEmail(r.email)}</a>` : ''}
        ${r.varsta ? `<span style="font-size:10.5px;color:var(--muted);${r.tel||r.email?'display:block':''}">${r.varsta}</span>` : ''}
      </td>
      <td class="wrap" style="font-size:12px;color:var(--muted)">${esc(r.obiectiv)||'—'}</td>
      <td class="wrap" style="font-size:11px;color:var(--muted)">${esc(r.interese)||'—'}</td>
      <td><span class="urgenta-badge urg-${urg}">${urg||'—'}${urg>=4?' 🔥':''}</span></td>
      <td style="font-size:11.5px">${esc(r.buget)||'—'}</td>

      <td class="admin-col" ${admVis}>
        <select class="ie-select" onchange="saveField(this,'${r.id}','status');updatePill(this)">
          ${['Nou','Contactat','Interesat','Neinteresat','Client','Arhivat']
            .map(s=>`<option ${statusVal===s?'selected':''}>${s}</option>`).join('')}
        </select>
        <span class="s-pill s-${statusVal}" style="margin-top:3px;display:block">${statusVal}</span>
      </td>
      <td class="admin-col" ${admVis}>
        <select class="ie-select" onchange="saveField(this,'${r.id}','nivel')">
          ${['','⭐ Scăzut','⭐⭐ Mediu','⭐⭐⭐ Ridicat','⭐⭐⭐⭐ Foarte ridicat']
            .map(n=>`<option ${(r.nivel||'')===n?'selected':''}>${n}</option>`).join('')}
        </select>
      </td>
      <td class="admin-col" ${admVis}>
        <input class="ie-input" type="text" value="${esc(r.recomandare)||''}"
          placeholder="Omega 3, consultanță…"
          onblur="saveField(this,'${r.id}','recomandare')">
      </td>
      <td class="admin-col" ${admVis}>
        <input class="ie-date" type="date" value="${r.followup||''}"
          onchange="saveField(this,'${r.id}','followup')">
      </td>
      <td class="admin-col wrap" ${admVis}>
        <textarea class="ie-textarea"
          placeholder="Observații…"
          onblur="saveField(this,'${r.id}','observatii')">${esc(r.observatii)||''}</textarea>
      </td>
    </tr>`;
  }).join('');
}

/* ══ TOGGLE COLOANE ADMIN ══ */
function toggleAdminCols() {
  adminColsVisible = !adminColsVisible;
  const btn = document.getElementById('toggleBtn');
  document.querySelectorAll('.admin-col, .admin-col-hdr').forEach(el => {
    el.style.display = adminColsVisible ? '' : 'none';
  });
  btn.textContent = adminColsVisible ? '◀ Ascunde coloane admin' : '▶ Arată coloane admin';
}

/* ══ SAVE FIELD ══ */
async function saveField(el, id, field) {
  showToast('Se salvează…');
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'updateAdmin', id, field, value: el.value })
    });
    const row = allData.find(r => r.id === id);
    if (row) row[field] = el.value;
    showToast('✓ Salvat!');
  } catch(e) {
    showToast('⚠️ Eroare salvare');
  }
}

/* Actualizare pill status vizual */
function updatePill(sel) {
  const pill = sel.parentElement.querySelector('.s-pill');
  if (!pill) return;
  pill.className = 's-pill s-' + sel.value;
  pill.textContent = sel.value;
}

/* ══ EXPORT CSV ══ */
function exportCSV() {
  const headers = ['ID','Data','Nume','Telefon','Email','Varsta','Obiectiv','Interese','Urgenta','Buget','Mesaj','Status','Nivel','Recomandare','Followup','Observatii'];
  const rows = allData.map(r => [
    r.id, r.data, r.nume, r.tel, r.email, r.varsta,
    r.obiectiv, r.interese, r.urgenta, r.buget, r.mesaj,
    r.status, r.nivel, r.recomandare, r.followup, r.observatii
  ].map(v => '"' + (v||'').toString().replace(/"/g,'""') + '"').join(','));

  const csv  = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'nutrisib_leads_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ CSV exportat!');
}

/* ══ UTILS ══ */
function esc(s) {
  if (!s) return '';
  return s.toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function shortEmail(e) {
  if (!e || e.length <= 22) return e;
  return e.slice(0,10) + '…' + e.slice(e.lastIndexOf('@'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(window._tt);
  window._tt = setTimeout(() => { t.style.display = 'none'; }, 2200);
}

window.onload = loadData;
</script>
