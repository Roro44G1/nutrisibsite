<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriSib Admin v2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0A2363;
  --navy2: #1B2A4A;
  --navy-light: #2A3F6F;
  --gold: #C5A021;
  --gold-light: #FFF8E0;
  --pearl: #F8FAFC;
  --white: #ffffff;
  --border: #E2E8F0;
  --text: #1E2A3A;
  --muted: #64748B;
  --admin-bg: #FFFDF5;
  --admin-bg2: #F0F4FF;

  --s-nou:         #2563EB;
  --s-contactat:   #D97706;
  --s-interesat:   #059669;
  --s-programat:   #7C3AED;
  --s-finalizat:   #0E7490;
  --s-neinteresat: #6B7280;
  --s-client:      #15803D;
  --s-arhivat:     #DC2626;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text); background:var(--pearl); min-height:100vh; }

/* ── TOPBAR ── */
.topbar {
  background: var(--navy);
  height: 56px; padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 8px rgba(10,35,99,0.3);
  position: sticky; top:0; z-index:200;
}
.topbar-brand { display:flex; align-items:center; gap:14px; }
.topbar-logo { height:32px; width:auto; }
.topbar-divider { width:1px; height:20px; background:rgba(255,255,255,0.2); }
.topbar-label { font-size:13px; font-weight:600; color:rgba(255,255,255,0.9); }
.topbar-sub   { font-size:10px; color:rgba(255,255,255,0.5); margin-top:1px; }
.topbar-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

.badge {
  background:rgba(197,160,33,0.2); border:1px solid rgba(197,160,33,0.4);
  color:#F5D060; border-radius:16px; padding:3px 10px;
  font-size:11px; font-weight:600; font-family:'DM Mono',monospace;
}
.btn-topbar {
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
  color:white; padding:6px 12px; border-radius:6px; cursor:pointer;
  font-size:11px; font-weight:500; transition:background 0.2s; white-space:nowrap;
}
.btn-topbar:hover { background:rgba(255,255,255,0.2); }

/* ── SOURCE SWITCHER ── */
.source-switcher {
  display: flex; gap:4px;
  background: rgba(255,255,255,0.08);
  border-radius: 8px; padding:3px;
}
.source-btn {
  padding: 5px 14px; border-radius: 6px; border:none; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600;
  transition: all 0.2s; white-space:nowrap;
  color: rgba(255,255,255,0.6); background:transparent;
}
.source-btn.active {
  background: var(--gold); color: var(--navy);
  box-shadow: 0 2px 6px rgba(197,160,33,0.4);
}
.source-btn:not(.active):hover { color:white; background:rgba(255,255,255,0.12); }

/* ── FILTER BAR ── */
.filterbar {
  background:var(--white); border-bottom:1px solid var(--border);
  padding:10px 20px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;
}
.search-wrap { position:relative; flex:1; min-width:160px; max-width:280px; }
.search-wrap input { width:100%; padding:7px 10px 7px 28px; border:1px solid var(--border); border-radius:6px; font-size:12px; outline:none; font-family:'DM Sans',sans-serif; }
.search-wrap input:focus { border-color:var(--navy); }
.search-wrap::before { content:'🔍'; position:absolute; left:8px; top:50%; transform:translateY(-50%); font-size:11px; pointer-events:none; }
.flt-select { padding:7px 8px; border:1px solid var(--border); border-radius:6px; font-size:12px; background:var(--white); outline:none; cursor:pointer; font-family:'DM Sans',sans-serif; }
.flt-select:focus { border-color:var(--navy); }

/* ── SURSA INDICATOR ── */
.source-indicator {
  padding: 8px 20px;
  font-size:11px; font-weight:600;
  display:flex; align-items:center; gap:8px;
}
.source-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.dot-targ     { background:#C5A021; }
.dot-evaluari { background:#3E92CC; }
.dot-complete { background:#7C3AED; }

/* ── TABLE ── */
.table-container { padding:16px 20px; overflow:auto; -webkit-overflow-scrolling:touch; }
.table-card { background:var(--white); border-radius:12px; box-shadow:0 2px 16px rgba(10,35,99,0.07); overflow:hidden; }

/* Coloane TÂRG */
.tbl-targ  { min-width:1240px; }
col.c-id       { width:75px; }
col.c-data     { width:110px; }
col.c-nume     { width:140px; }
col.c-contact  { width:165px; }
col.c-obiectiv { width:185px; }
col.c-interese { width:165px; }
col.c-urg      { width:60px; }
col.c-buget    { width:115px; }
col.c-status   { width:140px; }
col.c-nivel    { width:135px; }
col.c-rec      { width:175px; }
col.c-followup { width:115px; }
col.c-obs      { width:200px; }

/* Coloane EVALUĂRI */
.tbl-eval  { min-width:1060px; }

/* Coloane EVALUĂRI COMPLETE */
.tbl-complete { min-width:1200px; }
col.ec-id       { width:80px; }
col.ec-data     { width:115px; }
col.ec-nume     { width:145px; }
col.ec-contact  { width:170px; }
col.ec-bio      { width:160px; }
col.ec-sanatate { width:200px; }
col.ec-prioritate { width:180px; }
col.ec-motivatie  { width:80px; }
col.ec-status   { width:130px; }
col.ec-followup { width:115px; }
col.ec-obs      { width:190px; }
col.e-id       { width:80px; }
col.e-data     { width:115px; }
col.e-nume     { width:145px; }
col.e-contact  { width:170px; }
col.e-format   { width:140px; }
col.e-problema { width:210px; }
col.e-mesaj    { width:195px; }
col.e-status   { width:135px; }
col.e-prior    { width:110px; }
col.e-followup { width:115px; }
col.e-obs      { width:195px; }

table { width:100%; border-collapse:collapse; }

thead th {
  background:var(--navy); color:rgba(255,255,255,0.82);
  padding:9px 10px; text-align:left; font-size:10px; font-weight:600;
  text-transform:uppercase; letter-spacing:0.05em; white-space:nowrap;
  position:sticky; top:0; z-index:10;
}
th.admin-start { background:var(--navy-light); border-left:2px solid var(--gold); color:#F5D060; }

/* Header albastru pentru evaluări */
.tbl-eval thead th { background:var(--navy2); }
.tbl-eval th.admin-start { background:#1a3a6a; }
/* Header violet pentru evaluări complete */
.tbl-complete thead th { background:#4c1d95; }
.tbl-complete th.admin-start { background:#5b21b6; border-left-color:#C5A021; }

td { padding:10px; border-bottom:1px solid #F1F5F9; vertical-align:middle; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
tr:hover td { background:#F0F6FF !important; }

.cell-id   { font-family:'DM Mono',monospace; font-size:10px; color:var(--navy); background:rgba(10,35,99,0.08); padding:2px 6px; border-radius:3px; display:inline-block; }
.cell-name { font-weight:600; }
.cell-contact a { display:block; color:var(--navy); text-decoration:none; font-size:11px; overflow:hidden; text-overflow:ellipsis; }
.cell-contact a:hover { text-decoration:underline; }

.urgenta-badge { font-weight:700; font-size:11px; font-family:'DM Mono',monospace; }
.urg-1,.urg-2 { color:#059669; }
.urg-3        { color:#D97706; }
.urg-4,.urg-5 { color:#DC2626; }

/* Status pills */
.s-pill { display:inline-block; padding:2px 7px; border-radius:10px; font-size:10px; font-weight:600; white-space:nowrap; }
.s-Nou          { background:#EFF6FF; color:var(--s-nou); }
.s-Contactat    { background:#FFFBEB; color:var(--s-contactat); }
.s-Interesat    { background:#ECFDF5; color:var(--s-interesat); }
.s-Programat    { background:#F5F3FF; color:var(--s-programat); }
.s-Finalizat    { background:#ECFEFF; color:var(--s-finalizat); }
.s-Neinteresat  { background:#F3F4F6; color:var(--s-neinteresat); }
.s-Client       { background:#F0FDF4; color:var(--s-client); }
.s-Arhivat      { background:#FEF2F2; color:var(--s-arhivat); }

/* Admin columns */
td.admin-col { background:var(--admin-bg) !important; }
td.admin-col:first-of-type { border-left:2px solid var(--gold); }
tr:hover td.admin-col { background:#FFF8DC !important; }
/* Admin eval */
td.admin-col-eval { background:var(--admin-bg2) !important; }
td.admin-col-eval:first-of-type { border-left:2px solid #3E92CC; }
tr:hover td.admin-col-eval { background:#E0ECFF !important; }
/* Admin complete */
td.admin-col-comp { background:#faf5ff !important; }
td.admin-col-comp:first-of-type { border-left:2px solid #7C3AED; }
tr:hover td.admin-col-comp { background:#ede9fe !important; }

.ie-select,.ie-input,.ie-date,.ie-textarea {
  width:100%; border:1px solid transparent; border-radius:4px;
  padding:3px 6px; font-size:11px; background:transparent; outline:none;
  transition:all 0.15s; font-family:'DM Sans',sans-serif;
}
.ie-select:hover,.ie-input:hover,.ie-date:hover,.ie-textarea:hover { border-color:#D4D4AA; background:#FFFEF7; }
.ie-select:focus,.ie-input:focus,.ie-date:focus,.ie-textarea:focus { border-color:var(--gold); background:var(--white); box-shadow:0 0 0 2px rgba(197,160,33,0.15); }
.ie-textarea { resize:vertical; min-height:36px; }

/* Tag format */
.fmt-tag { display:inline-block; padding:2px 7px; border-radius:10px; font-size:10px; font-weight:600; background:#EFF6FF; color:#2563EB; white-space:nowrap; }
.fmt-sibiu { background:#ECFDF5; color:#059669; }
.fmt-oricare { background:#F3F4F6; color:#374151; }

/* Loading / empty */
.state-row td { text-align:center; padding:40px; color:var(--muted); }
.spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin 0.6s linear infinite; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Toast */
.toast { position:fixed; bottom:16px; right:16px; background:var(--navy); color:white; padding:8px 14px; border-radius:8px; font-size:12px; font-weight:500; display:none; box-shadow:0 6px 20px rgba(10,35,99,0.3); z-index:999; border-left:3px solid var(--gold); }

/* Stats bar */
.stats-bar {
  display:flex; gap:16px; padding:8px 20px; background:#FFFDF5;
  border-bottom:1px solid #EDE8DA; flex-wrap:wrap;
}
.stat-chip {
  display:flex; align-items:center; gap:6px;
  font-size:11px; font-weight:600; color:var(--muted);
}
.stat-chip-dot { width:8px; height:8px; border-radius:50%; }

@media (max-width:1024px) { .filterbar { padding:8px 12px; } .table-container { padding:12px; } .topbar { padding:0 12px; } }
@media (max-width:768px) {
  .topbar-logo { height:26px; }
  .badge { font-size:10px; padding:2px 8px; }
  .btn-topbar { font-size:10px; padding:5px 8px; }
  .source-btn { font-size:10px; padding:4px 10px; }
  .filterbar { flex-direction:column; align-items:stretch; }
  .search-wrap { max-width:none; }
  .table-container { padding:8px; }
}
</style>
</head>
<body>

<script>
  // ════════════════════════════════════════════════════
  // CONFIGURARE — înlocuiește cu URL-ul tău Apps Script v4
  // ════════════════════════════════════════════════════
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzKP6xamXU9DJlod81LEsqEYcb5bYenmUSf1n6rGnJN2fFubZJoiZ47nb53WqgTJxAd5w/exec';
  const ADMIN_PASSWORD  = '2026';

  let currentSource = 'targ'; // 'targ' | 'evaluari' | 'complete'
  let allData = [];
</script>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <img class="topbar-logo" src="https://nutrisib.club/logo/logo_navy_pearl.png" alt="NutriSib" onerror="this.style.display='none'">
    <div class="topbar-divider"></div>
    <div>
      <div class="topbar-label">NutriSib Admin v2</div>
      <div class="topbar-sub" id="topbarSub">nutrisib.club</div>
    </div>
  </div>
  <div class="topbar-right">
    <!-- SOURCE SWITCHER -->
    <div class="source-switcher">
      <button class="source-btn active" id="btnTarg"     onclick="switchSource('targ')">🎪 Târg / Evenimente</button>
      <button class="source-btn"        id="btnEvaluari" onclick="switchSource('evaluari')">🌿 Evaluări Gratuite</button>
    </div>
    <span class="badge" id="badgeTotal">— intrări</span>
    <button class="btn-topbar" onclick="loadData()">↻ Reîncarcă</button>
    <button class="btn-topbar" onclick="exportCSV()">📊 Export</button>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filterbar" id="filterBar">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Caută nume, telefon, email…" oninput="filterRows()">
  </div>
  <select class="flt-select" id="filterStatus" onchange="filterRows()">
    <option value="">Toate statusurile</option>
  </select>
  <select class="flt-select" id="filterExtra" onchange="filterRows()">
    <option value="">—</option>
  </select>
</div>

<!-- STATS BAR -->
<div class="stats-bar" id="statsBar" style="display:none">
  <!-- injectat dinamic -->
</div>

<!-- TABLE -->
<div class="table-container">
  <div class="table-card">
    <table id="mainTable">
      <colgroup id="colGroup"></colgroup>
      <thead id="tableHead"></thead>
      <tbody id="tableBody">
        <tr class="state-row"><td colspan="13"><span class="spinner"></span>Se verifică autentificarea…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
function checkAuth() {
  if (sessionStorage.getItem('ns_auth') === ADMIN_PASSWORD) return true;
  const input = prompt('🔐 Parolă admin NutriSib:');
  if (input === ADMIN_PASSWORD) { sessionStorage.setItem('ns_auth', input); return true; }
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#64748B">Acces restricționat.</div>';
  return false;
}

// ═══════════════════════════════════════════════════════
// SOURCE SWITCH
// ═══════════════════════════════════════════════════════
function switchSource(src) {
  currentSource = src;
  document.getElementById('btnTarg').classList.toggle('active', src === 'targ');
  document.getElementById('btnEvaluari').classList.toggle('active', src === 'evaluari');
  document.getElementById('btnComplete').classList.toggle('active', src === 'complete');
  const cls = src === 'targ' ? 'tbl-targ' : src === 'evaluari' ? 'tbl-eval' : 'tbl-complete';
  document.getElementById('mainTable').className = cls;
  updateFiltersForSource(src);
  loadData();
}

function updateFiltersForSource(src) {
  const statusSel = document.getElementById('filterStatus');
  const extraSel  = document.getElementById('filterExtra');

  if (src === 'targ') {
    statusSel.innerHTML = `
      <option value="">Toate statusurile</option>
      <option>Nou</option><option>Contactat</option><option>Interesat</option>
      <option>Neinteresat</option><option>Client</option><option>Arhivat</option>`;
    extraSel.innerHTML = `
      <option value="">Orice urgență</option>
      <option value="5">🔥 Urgență 5</option>
      <option value="4">Urgență ≥ 4</option>
      <option value="3">Urgență ≥ 3</option>`;
    extraSel.title = 'Filtru urgență';
  } else if (src === 'evaluari') {
    statusSel.innerHTML = `
      <option value="">Toate statusurile</option>
      <option>Nou</option><option>Contactat</option><option>Programat</option>
      <option>Finalizat</option><option>Neinteresat</option><option>Client</option><option>Arhivat</option>`;
    extraSel.innerHTML = `
      <option value="">Orice format</option>
      <option value="Online (Zoom)">Online (Zoom)</option>
      <option value="Fizic in Sibiu">Fizic in Sibiu</option>
      <option value="Oricare">Oricare</option>`;
    extraSel.title = 'Filtru format';
  } else {
    // complete
    statusSel.innerHTML = `
      <option value="">Toate statusurile</option>
      <option>Nou</option><option>Contactat</option><option>Programat</option>
      <option>Finalizat</option><option>Client</option><option>Arhivat</option>`;
    extraSel.innerHTML = `
      <option value="">Orice prioritate</option>
      <option>Energie si vitalitate</option>
      <option>Slabit sustenabil</option>
      <option>Crestere masa musculara</option>
      <option>Claritate mentala / concentrare</option>
      <option>Imbunatatire analize medicale</option>
      <option>Longevitate sanatoasa</option>`;
    extraSel.title = 'Filtru prioritate';
  }
}

// ═══════════════════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════════════════
async function loadData() {
  if (!checkAuth()) return;

  const cols = currentSource === 'targ' ? 13 : currentSource === 'evaluari' ? 11 : 11;
  document.getElementById('tableBody').innerHTML =
    `<tr class="state-row"><td colspan="${cols}"><span class="spinner"></span>Se încarcă…</td></tr>`;
  renderHeader(currentSource);

  try {
    const url = APPS_SCRIPT_URL + '?action=getAll&sheet=' + currentSource + '&t=' + Date.now();
    const res  = await fetch(url);
    const json = await res.json();
    allData = json.data || [];
    renderStats(allData);
    filterRows();
    document.getElementById('badgeTotal').textContent = allData.length + ' intrări';
    document.getElementById('topbarSub').textContent =
      currentSource === 'targ' ? 'Participanti Targ' :
      currentSource === 'evaluari' ? 'Evaluari Gratuite' : 'Evaluari Complete';
  } catch(e) {
    document.getElementById('tableBody').innerHTML =
      `<tr class="state-row"><td colspan="13">⚠️ Eroare la încărcare. Verifică URL-ul Apps Script.</td></tr>`;
  }
}

// ═══════════════════════════════════════════════════════
// HEADER dinamic
// ═══════════════════════════════════════════════════════
function renderHeader(src) {
  const cg   = document.getElementById('colGroup');
  const head = document.getElementById('tableHead');
  document.getElementById('mainTable').className = src === 'targ' ? 'tbl-targ' : 'tbl-eval';

  if (src === 'targ') {
    cg.innerHTML = `
      <col class="c-id"><col class="c-data"><col class="c-nume"><col class="c-contact">
      <col class="c-obiectiv"><col class="c-interese"><col class="c-urg"><col class="c-buget">
      <col class="c-status"><col class="c-nivel"><col class="c-rec"><col class="c-followup"><col class="c-obs">`;
    head.innerHTML = `<tr>
      <th>ID</th><th>Data / Ora</th><th>Nume</th><th>Contact</th>
      <th>Obiectiv</th><th>Interese</th><th>Urg</th><th>Buget</th>
      <th class="admin-start">Status</th><th>Nivel interes</th><th>Recomandare</th><th>Follow-up</th><th>Observații</th>
    </tr>`;
  } else {
    cg.innerHTML = `
      <col class="e-id"><col class="e-data"><col class="e-nume"><col class="e-contact">
      <col class="e-format"><col class="e-problema"><col class="e-mesaj">
      <col class="e-status"><col class="e-prior"><col class="e-followup"><col class="e-obs">`;
    head.innerHTML = `<tr>
      <th>ID</th><th>Data / Ora</th><th>Nume</th><th>Contact</th>
      <th>Format</th><th>Problemă principală</th><th>Mesaj</th>
      <th class="admin-start">Status</th><th>Prioritate</th><th>Follow-up</th><th>Observații</th>
    </tr>`;
  }
}

// ═══════════════════════════════════════════════════════
// STATS BAR
// ═══════════════════════════════════════════════════════
function renderStats(data) {
  const bar = document.getElementById('statsBar');
  if (!data.length) { bar.style.display = 'none'; return; }

  const counts = {};
  data.forEach(r => {
    const s = r.status || 'Nou';
    counts[s] = (counts[s]||0) + 1;
  });

  const colors = {
    Nou:'#2563EB', Contactat:'#D97706', Interesat:'#059669', Programat:'#7C3AED',
    Finalizat:'#0E7490', Client:'#15803D', Neinteresat:'#6B7280', Arhivat:'#DC2626'
  };

  bar.innerHTML = Object.entries(counts).map(([s,n]) =>
    `<div class="stat-chip">
      <span class="stat-chip-dot" style="background:${colors[s]||'#6B7280'}"></span>
      <span>${s}: <strong>${n}</strong></span>
    </div>`
  ).join('');
  bar.style.display = 'flex';
}

// ═══════════════════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════════════════
function filterRows() {
  const q       = document.getElementById('searchInput').value.toLowerCase();
  const status  = document.getElementById('filterStatus').value;
  const extra   = document.getElementById('filterExtra').value;

  let rows = allData.filter(r => {
    if (q) {
      const searchable = currentSource === 'targ'
        ? [r.nume,r.tel,r.email,r.mesaj,r.obiectiv]
        : currentSource === 'evaluari'
        ? [r.nume,r.tel,r.email,r.mesaj,r.problema]
        : [r.nume,r.tel,r.email,r.sanatate,r.prioritate];
      if (!searchable.some(v => (v||'').toLowerCase().includes(q))) return false;
    }
    const rStatus = r.status || 'Nou';
    if (status && rStatus !== status) return false;

    if (extra) {
      if (currentSource === 'targ') {
        if (parseInt(r.urgenta) < parseInt(extra)) return false;
      } else if (currentSource === 'evaluari') {
        if (!r.format.toLowerCase().includes(extra.toLowerCase())) return false;
      } else {
        if (extra && !(r.prioritate||'').toLowerCase().includes(extra.toLowerCase())) return false;
      }
    }
    return true;
  });

  rows.sort((a,b) => (b.data||'').localeCompare(a.data||''));
  renderTable(rows);
  document.getElementById('badgeTotal').textContent = rows.length + '/' + allData.length + ' intrări';
}

// ═══════════════════════════════════════════════════════
// RENDER TABLE
// ═══════════════════════════════════════════════════════
function renderTable(rows) {
  const tbody = document.getElementById('tableBody');
  const cols  = currentSource === 'targ' ? 13 : 11;

  if (!rows.length) {
    tbody.innerHTML = `<tr class="state-row"><td colspan="${cols}">Nicio înregistrare. Datele apar după prima completare a formularului.</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r =>
    currentSource === 'targ' ? rowTarg(r) :
    currentSource === 'evaluari' ? rowEval(r) : rowComplete(r)
  ).join('');
}

      <select class="ie-select" onchange="saveField(this,'${r.id}','nivel','targ')">

    <td class="cell-contact">

// ═══════════════════════════════════════════════════════
// SAVE FIELD
// ═══════════════════════════════════════════════════════
async function saveField(el, id, field, sheet) {
  showToast('Se salvează…');
  try {
    const formBody = [
      'action=updateAdmin',
      'sheet='  + encodeURIComponent(sheet),
      'id='     + encodeURIComponent(id),
      'field='  + encodeURIComponent(field),
      'value='  + encodeURIComponent(el.value)
    ].join('&');

    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: formBody
    });

    const row = allData.find(r => r.id === id);
    if (row) row[field] = el.value;
    showToast('✓ Salvat!');
  } catch(e) {
    showToast('⚠️ Eroare salvare');
  }
}

// ═══════════════════════════════════════════════════════
// UPDATE PILL
// ═══════════════════════════════════════════════════════
function updatePill(sel) {
  const pill = sel.parentElement.querySelector('.s-pill');
  if (!pill) return;
  pill.className = 's-pill s-' + sel.value;
  pill.textContent = sel.value;
}

// ═══════════════════════════════════════════════════════
// EXPORT CSV
// ═══════════════════════════════════════════════════════
function exportCSV() {
  if (!allData.length) { showToast('⚠️ Nicio dată de exportat'); return; }

  const isTarg     = currentSource === 'targ';
  const isComplete = currentSource === 'complete';
  const keys = isTarg
    ? ['id','data','nume','tel','email','varsta','obiectiv','interese','urgenta','buget','mesaj','status','nivel','recomandare','followup','observatii','convertit']
    : isComplete
    ? ['id','data','nume','tel','email','varsta','sex','ocupatie','imc','imc_label','rmb','sanatate','prioritate','motivatie','status','followup','observatii','convertit']
    : ['id','data','nume','tel','email','varsta','format','problema','mesaj','status','prioritate','followup','observatii','convertit'];

  const header = keys.join(',');
  const rows   = allData.map(r =>
    keys.map(k => '"' + String(r[k]||'').replace(/"/g,'""') + '"').join(',')
  );

  const csv  = '\uFEFF' + [header, ...rows].join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `nutrisib_${currentSource}_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  showToast('✓ Export descărcat!');
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function shortEmail(e) {
  if (!e || e.length <= 22) return e;
  const [local, domain] = e.split('@');
  return local.slice(0,8) + '…@' + domain;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2200);
}
