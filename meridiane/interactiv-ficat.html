    <meta charset="UTF-8">

        body {

            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .infographic-container {
            flex-grow: 1;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .meridian-section {
            width: 100%;
            max-width: 750px;
        }
        h2 {
            font-size: 2em;
            font-weight: 700;
            color: #0A2463;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        select {
            margin-bottom: 2rem;
            padding: 0.75rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 0.5rem;
            border: 2px solid #3E92CC;
            background-color: #e0f2f7;
            color: #0A2463;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s ease-in-out;
            width: 100%;
        }
        select:hover {
            border-color: #0A2463;
            background-color: #d1eff6;
        }
        select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(62, 146, 204, 0.4);
        }
        .bar-container {
            position: relative;
            width: 100%;
            height: 40px;
            display: flex;
            border: 3px solid #0A2463;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }
        .segment {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            font-size: 0.9em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }
        .segment.extreme-red    { background-color: #EF4444; }
        .segment.moderate-yellow { background-color: #FACC15; }
        .segment.tendency-blue   { background-color: #3B82F6; }
        .segment.balanced-green  { background-color: #22C55E; }
        .arrow {
            position: absolute;
            bottom: 5px;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #212529;
            transform: translateX(-50%);
            transition: left 0.4s ease-in-out;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
            z-index: 10;
        }
        .info-box {
            background-color: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            padding: 1.5rem;
            margin-top: 1rem;
            width: 100%;
            border: 1px solid #ddd;
        }
        .info-box h3 {
            font-size: 1.4em;
            color: #0A2463;
            margin-top: 0;
            margin-bottom: 1rem;
            font-weight: 700;
            border-bottom: 2px dashed #3E92CC;
            padding-bottom: 0.5rem;
        }
        .info-box p {
            font-size: 1.05em;
            margin-bottom: 0.75rem;
            color: #333;
            line-height: 1.6;
        }
        .info-box ul {
            list-style-type: none;
            padding-left: 0;
            font-size: 1em;
            color: #475569;
        }
        .info-box li {
            margin-bottom: 0.5rem;
            padding-left: 1.2em;
            text-indent: -1.2em;
        }
        .info-box li::before {
            content: "🔹 ";
        }
        .footer-copyright {
            text-align: center;
            padding: 1rem;
            background-color: #e9ecef;
            color: #495057;
            font-size: 0.9em;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            h2 { font-size: 1.6em; }
            .bar-container { height: 35px; }
            .segment { font-size: 0.7em; }
            .info-box { padding: 1.2rem; }
            .info-box h3 { font-size: 1.2em; }
            .info-box p, .info-box ul { font-size: 0.95em; }
        }
    </style>
</head>

        function afiseazaInformatii(meridianId, index) {
            let data;
            if (meridianId === 'ficat') {
                data = meridianLiverData[index];
            }
            if (!data) return;
            
            const infoDisplay = document.getElementById(`infoDisplay-${meridianId}`);
            infoDisplay.innerHTML = `
                <h3>Stare: ${data.stare}</h3>
                <p><strong>🧬 Fiziologie & Simptome:</strong><br>${data.fiziologic}</p>
                <p><strong>🥗 Nutriție recomandată:</strong><br>${data.nutritie}</p>
                <p><strong>💊 Suplimente & plante medicinale:</strong><br>${data.suplimente}</p>
                <p><strong>🧠 Stare emoțională & psihică:</strong><br>${data.emotional}</p>
                <p><strong>👪 Relația cu părinții (arhetipuri Yin/Yang):</strong><br>${data.relatiiParinti}</p>
                <p><strong>💆 Terapie & stil de viață:</strong><br>${data.terapie}</p>
            `;
        }

        function mutaSageata(meridianId, indexStr) {
            const index = parseInt(indexStr, 10);
            const totalSegments = 7;
            const segmentWidth = 100 / totalSegments;
            const procent = (index * segmentWidth) + (segmentWidth / 2);
            
            document.getElementById(`indicator-${meridianId}`).style.left = `${procent}%`;
            afiseazaInformatii(meridianId, index);
        }

       document.addEventListener('DOMContentLoaded', () => {
    const selectFicat = document.getElementById('select-ficat');
    const barContainer = document.querySelector('.bar-container');
    const arrow = document.getElementById('indicator-ficat');
    let isDragging = false;

    function updateFromPosition(clientX) {
        const rect = barContainer.getBoundingClientRect();
        let x = clientX - rect.left; // poziție relativă
        const width = rect.width;
        // Limităm la 0..width
        x = Math.max(0, Math.min(x, width));
        const totalSegments = 7;
        const segmentWidth = width / totalSegments;
        let index = Math.floor(x / segmentWidth);
        if (index >= totalSegments) index = totalSegments - 1;
        // Setăm dropdown și săgeata
        selectFicat.value = index;
        const procent = (index * segmentWidth) + (segmentWidth / 2);
        arrow.style.left = `${(procent / width) * 100}%`;
        afiseazaInformatii('ficat', index);
    }

    // Click pe bară
    barContainer.addEventListener('click', (e) => {
        if (!isDragging) {
            updateFromPosition(e.clientX);
        }
    });

    // Drag (mouse down + move)
    barContainer.addEventListener('mousedown', (e) => {
        isDragging = true;
        updateFromPosition(e.clientX);
        e.preventDefault(); // previne selecția textului
    });

    document.addEventListener('mousemove', (e) => {
        if (isDragging) {
            updateFromPosition(e.clientX);
        }
    });

    document.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false;
        }
    });

    // Suport și pentru touchscreen
    barContainer.addEventListener('touchstart', (e) => {
        isDragging = true;
        updateFromPosition(e.touches[0].clientX);
        e.preventDefault();
    });

    document.addEventListener('touchmove', (e) => {
        if (isDragging) {
            updateFromPosition(e.touches[0].clientX);
        }
    });

    document.addEventListener('touchend', () => {
        isDragging = false;
    });

    // Dropdown-ul rămâne funcțional (se actualizează și când e schimbat din dropdown)
    selectFicat.addEventListener('change', (event) => {
        const index = parseInt(event.target.value, 10);
        const totalSegments = 7;
        const segmentWidth = 100 / totalSegments;
        const procent = (index * segmentWidth) + (segmentWidth / 2);
        arrow.style.left = `${procent}%`;
        afiseazaInformatii('ficat', index);
    });

    // Inițializare
    mutaSageata('ficat', selectFicat.value);
});

        // Securitate anti-copiere
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'c') { e.preventDefault(); }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); }
            if (e.key === 'F12') { e.preventDefault(); }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); }
            if (e.ctrlKey && e.shiftKey && e.key === 'J') { e.preventDefault(); }
        });
    </script>
