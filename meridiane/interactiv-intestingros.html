<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafic Interactiv Meridian Intestin Gros – Evaluare și Recomandări</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .infographic-container {
            flex-grow: 1;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .meridian-section {
            width: 100%;
            max-width: 750px;
        }
        h2 {
            font-size: 2em;
            font-weight: 700;
            color: #0A2463;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        select {
            margin-bottom: 2rem;
            padding: 0.75rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 0.5rem;
            border: 2px solid #3E92CC;
            background-color: #e0f2f7;
            color: #0A2463;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s ease-in-out;
            width: 100%;
        }
        select:hover {
            border-color: #0A2463;
            background-color: #d1eff6;
        }
        select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(62, 146, 204, 0.4);
        }
        .bar-container {
            position: relative;
            width: 100%;
            height: 40px;
            display: flex;
            border: 3px solid #0A2463;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }
        .segment {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            font-size: 0.9em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }
        .segment.extreme-red    { background-color: #EF4444; }
        .segment.moderate-yellow { background-color: #FACC15; }
        .segment.tendency-blue   { background-color: #3B82F6; }
        .segment.balanced-green  { background-color: #22C55E; }
        .arrow {
            position: absolute;
            bottom: 5px;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #212529;
            transform: translateX(-50%);
            transition: left 0.4s ease-in-out;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
            z-index: 10;
        }
        .info-box {
            background-color: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            padding: 1.5rem;
            margin-top: 1rem;
            width: 100%;
            border: 1px solid #ddd;
        }
        .info-box h3 {
            font-size: 1.4em;
            color: #0A2463;
            margin-top: 0;
            margin-bottom: 1rem;
            font-weight: 700;
            border-bottom: 2px dashed #3E92CC;
            padding-bottom: 0.5rem;
        }
        .info-box p {
            font-size: 1.05em;
            margin-bottom: 0.75rem;
            color: #333;
            line-height: 1.6;
        }
        .footer-copyright {
            text-align: center;
            padding: 1rem;
            background-color: #e9ecef;
            color: #495057;
            font-size: 0.9em;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            h2 { font-size: 1.6em; }
            .bar-container { height: 35px; }
            .segment { font-size: 0.7em; }
            .info-box { padding: 1.2rem; }
            .info-box h3 { font-size: 1.2em; }
        }
    </style>
</head>
<body>

    <div class="infographic-container">
        <div class="meridian-section">
            <h2>Evaluare interactivă: starea meridianului intestin gros</h2>

            <select id="select-intestin-gros">
                <option value="0">Hipofuncție severă</option>
                <option value="1">Hipofuncție moderată</option>
                <option value="2">Dezechilibru ușor (Hipofuncție)</option>
                <option value="3" selected>Echilibru</option>
                <option value="4">Dezechilibru ușor (Hiperfuncție)</option>
                <option value="5">Hiperfuncție moderată</option>
                <option value="6">Hiperfuncție severă</option>
            </select>

            <div class="bar-container">
                <div class="segment extreme-red">---</div>
                <div class="segment moderate-yellow">--</div>
                <div class="segment tendency-blue">-</div>
                <div class="segment balanced-green">=</div>
                <div class="segment tendency-blue">+</div>
                <div class="segment moderate-yellow">++</div>
                <div class="segment extreme-red">+++</div>
                
                <div class="arrow" id="indicator-intestin-gros"></div>
            </div>

            <div id="infoDisplay-intestin-gros" class="info-box"></div>
        </div>
    </div>

    <footer class="footer-copyright">
        <p>Copyright: dr.ing. Radu Pascu - 2025</p>
    </footer>

    <script>
        const meridianLargeIntestineData = [

                nutritie: "Alimentație caldă, gătită, ușor digestibilă. Supă de oase, cereale calde (orez, ovăz, hrișcă), legume rădăcinoase bine fierte, ghimbir, scorțișoară, anason. Evitarea completă a lactatelor, grăsimilor reci, crudităților, băuturilor reci. Mese mici și dese. Ceaiuri calde de ghimbir și anason.",
                suplimente: "Probiotice (Lactobacillus, Bifidobacterium), glutamină, zinc-carnosină, vitamina D3, Omega-3. Enzime digestive. Extracte din plante încălzitoare: ghimbir, cardamom, angelica. Sub supraveghere medicală.",
                emotional: "Incapacitate profundă de a renunța la trecut. Tristețe cronică, melancolie, lipsă de voință, sentiment de vid interior. Tendință de a colecționa obiecte și resentimente. Frica de schimbare, de a pierde. Depresie mascată, apatie.",
                relatiiParinti: "Relație marcată de pierdere, abandon sau lipsa iubirii din partea mamei (Yin). Dificultate excesivă de a se detașa de figurile parentale, de a-și trăi propria viață. Sentimentul că trebuie să „păstreze” totul.",
                terapie: "Acupunctură pentru tonifierea Qi-ului: LI-4, ST-25, CV-6 cu moxibustie. Psihoterapie pentru doliu și atașament. Jurnal de eliberare. Qi Gong pentru Metal (exerciții de respirație și curățare)."
            },
            {
                stare: "Hipofuncție moderată",
                fiziologic: "Deficiență de Qi cu tendință la frig. Constipație cu scaune uscate sau diaree după mese reci. Balonare, disconfort abdominal, senzație de rece. Piele ternă, pori dilatați. Sinuzite sezoniere. Oboseală după masă. Dureri de umăr și cot. Răceli repetate.",

                suplimente: "Probiotice, enzime digestive, magneziu, vitamina C. Ceaiuri: mușețel, mentă, anason. Ulei de pește.",
                emotional: "Tristețe difuză, dificultate în a se debarasa de vechi obiceiuri. Nostalgie excesivă. Incapacitate de a ierta unele persoane. Lipsă de entuziasm.",
                relatiiParinti: "Legătură prea puternică cu mama, nevoie de aprobare constantă. Teama de a o dezamăgi. Dificultate în a pune limite.",
                terapie: "Dietă echilibrată, mese regulate. Masaj abdominal. Stimularea punctelor LI-4, ST-36. Consiliere pentru stabilirea limitelor. Plimbări în natură."
            },
            {
                stare: "Dezechilibru ușor (Hipofuncție)",
                fiziologic: "Ușoară lentoare intestinală, scaune tari din când în când. Balonare ocazională, sensibilitate la alimente reci. Piele ușor uscată, ten tern. Oboseală matinală ușoară. Răceli ușoare repetate.",
                nutritie: "Include alimente calde, fibroase, hidratare suficientă. Fructe coapte, legume la abur, cereale integrale. Condimente blânde: ghimbir, cardamom.",

                emotional: "Ușoară dificultate în a renunța la mici supărări. Tendință la melancolie. Uneori rigiditate în gândire.",

            },
            {
                stare: "Echilibru",
                fiziologic: "Tranzit intestinal regulat, scaune normale, fără efort. Piele curată, strălucitoare, fără erupții. Nas liber, respirație ușoară. Energie matinală optimă, imunitate puternică. Umeri și brațe relaxate.",

                emotional: "Capacitate de a lăsa trecutul în urmă, de a trăi prezentul. Hotărâre, ordine interioară, respect față de sine și ceilalți. Generozitate. Simț estetic dezvoltat.",
                relatiiParinti: "Relație sănătoasă, echilibrată, respect reciproc. Independență emoțională, dar cu dragoste. Capacitate de a-și onora familia fără a se sacrifica.",
                terapie: "Menține obiceiurile bune. Continuă practicile de mindfulness. Cultivă recunoștința. Activități creative."
            },
            {
                stare: "Dezechilibru ușor (Hiperfuncție)",
                fiziologic: "Constipație ușoară, cu senzație de căldură, scaune tari. Balonare postprandială, disconfort. Piele cu tendință acneică, câteva erupții. Nas ușor congestionat, gât uscat. Dureri de cap ocazionale. Iritabilitate.",
                nutritie: "Alimente răcoritoare, bogate în apă: castraveți, pepene, pere, mere, spanac. Cereale (orz, mei). Evită alimentele picante, cafeaua, alcoolul. Hidratare cu apă plată.",

                emotional: "Neliniște, frustrare ușoară, tendința de a critica. Dificultate în a se relaxa. Preocupare excesivă pentru detalii.",
                relatiiParinti: "Ușoară tensiune cu autoritatea paternă, senzația de a fi controlat. Rezistență la reguli.",
                terapie: "Exerciții de respirație profundă. Masaj LI-11, LI-4. Planificarea timpului pentru relaxare. Comunicare asertivă."
            },
            {
                stare: "Hiperfuncție moderată",
                fiziologic: "Constipație severă, scaune uscate, dureri abdominale, hemoroizi. Alternanță constipație-diaree. Acnee inflamatorie, furuncule, eczeme. Sinuzită cronică, epistaxis. Dureri de dinți, amigdalite repetate. Cefalee frontală. Umeri tensionați.",
                nutritie: "Dietă laxativă, răcoritoare. Sucuri de legume (țelină, castravete, sfeclă), fructe proaspete, multe fibre solubile. Evită stricat carnea roșie, lactatele grase, prăjelile. Consumă iaurturi probiotice.",
                suplimente: "Fibre (in, psyllium), magneziu, probiotice puternice, extracte de aloe vera, anghinare, armurariu. Omega-3 antiinflamator.",
                emotional: "Iritabilitate crescută, furie, frustrare, sentiment de a fi „blocat”. Incapacitate de a ierta, de a uita. Gândire obsesivă, insomnie. Critică constantă.",
                relatiiParinti: "Conflict deschis cu autoritatea paternă, rebeliune, luptă pentru control. Resentimente puternice.",
                terapie: "Terapie pentru managementul furiei. Sport intens (box, alergare) pentru descărcare. Meditație de iertare. Acupresură la LI-4, LI-11, GV-20."
            },
            {
                stare: "Hiperfuncție severă",
                fiziologic: "Foc toxic Yangming: constipație extremă, abdomen acut, febră înaltă, sete intensă, transpirații. Sau invers, diaree explozivă, arsuri anale, mucus/sânge. Acnee chistică severă, abcese, psoriazis. Sinuzite supurate, amigdalite pultacee. Cefalee violentă. Risc de ocluzie intestinală.",
                nutritie: "Regim strict sub supraveghere medicală. Lichide reci, ceaiuri de păpădie, cicoare. Sucuri de legume și fructe diluate. Post intermitent ușor, doar cu acordul medicului.",
                suplimente: "Numai sub control medical. Pot fi necesare antibiotice, corticosteroizi topici. Suport hepatic puternic. Hidratare intravenoasă în cazuri grave.",
                emotional: "Furie extremă, comportament impulsiv, agresivitate. Incapacitate totală de relaxare, insomnie. Sentiment de a exploda. Delir în caz de foc toxic.",
                relatiiParinti: "Conflict devastator cu autoritatea, transformându-se în auto-distrugere. Ruptură totală cu figura paternă sau cu propria disciplină interioară.",
                terapie: "Tratament medical de urgență. Acupunctură de dispersare. Consiliere psihologică intensivă. După stabilizare, reconstrucția relației cu sine și cu regulile."
            }
        ];

        const selectIntGros = document.getElementById('select-intestin-gros');
        const barContainer = document.querySelector('.bar-container');
        const arrow = document.getElementById('indicator-intestin-gros');
        let isDragging = false;

        function afiseazaInformatii(meridianId, index) {
            let data = meridianLargeIntestineData[index];
            if (!data) return;
            const infoDisplay = document.getElementById(`infoDisplay-${meridianId}`);
            infoDisplay.innerHTML = `
                <h3>Stare: ${data.stare}</h3>
                <p><strong>🧬 Fiziologie & Simptome:</strong><br>${data.fiziologic}</p>
                <p><strong>🥗 Nutriție recomandată:</strong><br>${data.nutritie}</p>
                <p><strong>💊 Suplimente & plante medicinale:</strong><br>${data.suplimente}</p>
                <p><strong>🧠 Stare emoțională:</strong><br>${data.emotional}</p>
                <p><strong>👪 Relația cu părinții (Metal – eliberare):</strong><br>${data.relatiiParinti}</p>
                <p><strong>💆 Terapie & stil de viață:</strong><br>${data.terapie}</p>
            `;
        }

        function updateFromPosition(clientX) {
            const rect = barContainer.getBoundingClientRect();
            let x = clientX - rect.left;
            const width = rect.width;
            x = Math.max(0, Math.min(x, width));
            const totalSegments = 7;
            const segmentWidth = width / totalSegments;
            let index = Math.floor(x / segmentWidth);
            if (index >= totalSegments) index = totalSegments - 1;
            selectIntGros.value = index;
            const procent = (index * segmentWidth) + (segmentWidth / 2);
            arrow.style.left = `${(procent / width) * 100}%`;
            afiseazaInformatii('intestin-gros', index);
        }

        barContainer.addEventListener('click', (e) => {
            if (!isDragging) updateFromPosition(e.clientX);
        });
        barContainer.addEventListener('mousedown', (e) => {
            isDragging = true;
            updateFromPosition(e.clientX);
            e.preventDefault();
        });
        document.addEventListener('mousemove', (e) => {
            if (isDragging) updateFromPosition(e.clientX);
        });
        document.addEventListener('mouseup', () => { isDragging = false; });
        barContainer.addEventListener('touchstart', (e) => {
            isDragging = true;
            updateFromPosition(e.touches[0].clientX);
            e.preventDefault();
        });
        document.addEventListener('touchmove', (e) => {
            if (isDragging) updateFromPosition(e.touches[0].clientX);
        });
        document.addEventListener('touchend', () => { isDragging = false; });

        selectIntGros.addEventListener('change', (event) => {
            const index = parseInt(event.target.value, 10);
            const totalSegments = 7;
            const segmentWidth = 100 / totalSegments;
            const procent = (index * segmentWidth) + (segmentWidth / 2);
            arrow.style.left = `${procent}%`;
            afiseazaInformatii('intestin-gros', index);
        });

        // Inițializare
        const initialIndex = parseInt(selectIntGros.value, 10);
        const totalSegments = 7;
        const segmentWidth = 100 / totalSegments;
        const procentInit = (initialIndex * segmentWidth) + (segmentWidth / 2);
        arrow.style.left = `${procentInit}%`;
        afiseazaInformatii('intestin-gros', initialIndex);

        // Securitate
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'c') e.preventDefault();
            if (e.ctrlKey && e.key === 'u') e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
            if (e.ctrlKey && e.shiftKey && e.key === 'I') e.preventDefault();
            if (e.ctrlKey && e.shiftKey && e.key === 'J') e.preventDefault();
        });
    </script>

</body>
</html>
