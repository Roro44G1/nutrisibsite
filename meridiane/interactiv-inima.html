<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafic Interactiv Meridian Inimă – Evaluare și Recomandări</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .infographic-container {
            flex-grow: 1;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .meridian-section {
            width: 100%;
            max-width: 750px;
        }
        h2 {
            font-size: 2em;
            font-weight: 700;
            color: #0A2463;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        select {
            margin-bottom: 2rem;
            padding: 0.75rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 0.5rem;
            border: 2px solid #3E92CC;
            background-color: #e0f2f7;
            color: #0A2463;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s ease-in-out;
            width: 100%;
        }
        select:hover {
            border-color: #0A2463;
            background-color: #d1eff6;
        }
        select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(62, 146, 204, 0.4);
        }
        .bar-container {
            position: relative;
            width: 100%;
            height: 40px;
            display: flex;
            border: 3px solid #0A2463;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }
        .segment {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            font-size: 0.9em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }
        .segment.extreme-red    { background-color: #EF4444; }
        .segment.moderate-yellow { background-color: #FACC15; }
        .segment.tendency-blue   { background-color: #3B82F6; }
        .segment.balanced-green  { background-color: #22C55E; }
        .arrow {
            position: absolute;
            bottom: 5px;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #212529;
            transform: translateX(-50%);
            transition: left 0.4s ease-in-out;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
            z-index: 10;
        }
        .info-box {
            background-color: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            padding: 1.5rem;
            margin-top: 1rem;
            width: 100%;
            border: 1px solid #ddd;
        }
        .info-box h3 {
            font-size: 1.4em;
            color: #0A2463;
            margin-top: 0;
            margin-bottom: 1rem;
            font-weight: 700;
            border-bottom: 2px dashed #3E92CC;
            padding-bottom: 0.5rem;
        }
        .info-box p {
            font-size: 1.05em;
            margin-bottom: 0.75rem;
            color: #333;
            line-height: 1.6;
        }
        .footer-copyright {
            text-align: center;
            padding: 1rem;
            background-color: #e9ecef;
            color: #495057;
            font-size: 0.9em;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            h2 { font-size: 1.6em; }
            .bar-container { height: 35px; }
            .segment { font-size: 0.7em; }
            .info-box { padding: 1.2rem; }
            .info-box h3 { font-size: 1.2em; }
        }
    </style>
</head>
<body>

    <div class="infographic-container">
        <div class="meridian-section">
            <h2>Evaluare interactivă: starea meridianului inimă</h2>

            <select id="select-inima">
                <option value="0">Hipofuncție severă</option>
                <option value="1">Hipofuncție moderată</option>
                <option value="2">Dezechilibru ușor (Hipofuncție)</option>
                <option value="3" selected>Echilibru</option>
                <option value="4">Dezechilibru ușor (Hiperfuncție)</option>
                <option value="5">Hiperfuncție moderată</option>
                <option value="6">Hiperfuncție severă</option>
            </select>

            <div class="bar-container">
                <div class="segment extreme-red">---</div>
                <div class="segment moderate-yellow">--</div>
                <div class="segment tendency-blue">-</div>
                <div class="segment balanced-green">=</div>
                <div class="segment tendency-blue">+</div>
                <div class="segment moderate-yellow">++</div>
                <div class="segment extreme-red">+++</div>
                
                <div class="arrow" id="indicator-inima"></div>
            </div>

            <div id="infoDisplay-inima" class="info-box">
                </div>
        </div>
    </div>

    <footer class="footer-copyright">
        <p>Copyright: dr.ing. Radu Pascu - 2025</p>
    </footer>

    <script>
        const meridianHeartData = [
            {
                stare: "Hipofuncție severă",
                fiziologic: "Deficiență majoră de Qi și Yang cardiac. Oboseală extremă, intoleranță la efort, palpitații continue. Mâini și picioare reci, senzație de frig intern. Ten palid sau cenușiu, buze cianotice. Insomnie profundă (sau somn excesiv, neodihnitor), transpirații spontane abundente. Puls slab, neregulat. Tensiune arterială foarte scăzută, risc de colaps cardiovascular. Memorie grav afectată, confuzie. Posibil edem periferic și dispnee la repaus.",
                nutritie: "Dietă urgentă pentru a susține Qi-ul și Yang-ul: alimente calde, gătite, tonifiante. Carne de vită, miel, pui fiert, ouă, cereale calde (orez, ovăz), legume rădăcinoase (morcov, pastârnac, cartofi dulci). Condimente încălzitoare: ghimbir, scorțișoară, piper negru. Supe dense, tocănițe. Evită complet alimentele reci, crude, băuturile cu gheață, lactatele nefermentate.",
                suplimente: "CoQ10 (ubiquinol), magneziu, Omega-3. Adaptogeni: Rhodiola, ginseng (Panax) cu precauție. Vitamine B complex, vitamina C, fier (sub control medical). Remedii tradiționale: formule pe bază de Astragalus, Codonopsis, scorțișoară (Gui Zhi). Supraveghere medicală obligatorie.",
                emotional: "Shen-ul este extrem de slăbit. Depresie profundă, lipsa totală a bucuriei (anhedonie), sentiment de goliciune. Anxietate cronică, frică de moarte. Vise confuze sau absente. Incapacitate de a iubi și a primi iubire, retragere socială. Sentiment de vinovăție copleșitor, ură de sine.",
                relatiiParinti: "Relația cu principiul matern (Yin) este profund lezată. Traumă emoțională timpurie legată de lipsa iubirii necondiționate, respingere, abandon. Incapacitate cronică de a se simți în siguranță emoțională. Resentiment față de mamă sau figurile de îngrijire.",
                terapie: "Acupunctură pentru tonifierea Qi-ului cardiac: HT-7, PC-6, CV-14, CV-4, ST-36 cu moxibustie. Meditație ghidată, reconectare cu emoțiile de iubire. Consiliere psihologică pentru vindecarea traumelor de atașament. Exerciții ușoare de Qi Gong (respirație profundă, mișcări lente)."
            },
            {
                stare: "Hipofuncție moderată",
                fiziologic: "Deficiență de Qi și sânge cardiac. Palpitații după efort, oboseală cronică, ușoare amețeli. Ten palid, buze mai puțin colorate. Insomnie cu treziri frecvente, dificultăți de adormire. Transpirații diurne ușoare. Memorie și concentrare diminuate. Tensiune arterială scăzută sau normală dar cu puls slab.",
                nutritie: "Alimente bogate în nutrienți pentru construirea sângelui și Qi-ului: carne de vită, ficat (ocazional), leguminoase (linte, fasole), spanac, sfeclă roșie, broccoli, cereale integrale, nuci, semințe. Fructe roșii (cireșe, fructe de pădure). Gătitul trebuie să fie blând, hrana să fie caldă.",
                suplimente: "CoQ10, magneziu, vitamine B, fier (dacă e deficiență), extract de păducel (Crataegus), Omega-3. Probiotice. Formule pe bază de Dang Gui (Angelica sinensis) și Longan (Gui Yuan) pentru sânge cardiac.",
                emotional: "Tristețe persistentă, lipsă de entuziasm, anxietate difuză. Dificultăți în exprimarea emoțiilor, tendință la plâns. Nevoie crescută de validare și afecțiune. Vise multe, agitate.",
                relatiiParinti: "Sentimentul că nu a primit suficientă iubire din partea mamei. Relație nesatisfăcătoare, cu o ușoară dependență emoțională sau, dimpotrivă, detașare defensivă. Tendința de a repeta tipare în relațiile intime.",
                terapie: "Dietă de susținere a sângelui. Masaj al punctelor HT-7, PC-6, SP-6. Qi Gong pentru inimă (mișcări calme, centrare). Jurnal emoțional, identificarea nevoilor de iubire. Terapie suportivă."
            },
            {
                stare: "Dezechilibru ușor (Hipofuncție)",
                fiziologic: "Ușoară deficiență de sânge cardiac, manifestată prin palpitații ocazionale, oboseală trecătoare, senzație de gol în piept. Somn superficial, trezire ușoară, vise rare. Ten ușor tern. Emoții fluctuante.",
                nutritie: "Include regulat alimente care hrănesc sângele: ouă, carne slabă, spanac, migdale, smochine, cereale integrale. Ceaiuri: frunze de zmeur, trifoi roșu. Evită excesul de cafea și zahăr.",
                suplimente: "Multivitamine cu minerale, ulei de pește, extract de păducel, magneziu seara pentru relaxare.",
                emotional: "Ușoară iritabilitate, tendință la îngrijorare, insatisfacție afectivă. Nevoie de reasigurare. Simțul umorului și bucuria sunt păstrate, dar mai puțin constante.",
                relatiiParinti: "Unele neînțelegeri sau așteptări nespuse din partea mamei; dorința de mai multă căldură emoțională. Poate căuta acest lucru în partener.",
                terapie: "Conștientizarea nevoilor emoționale. Masaj HT-7. Exerciții de respirație. Petrecerea timpului cu persoane dragi."
            },
            {
                stare: "Echilibru",
                fiziologic: "Inima funcționează optim: circulație sanguină excelentă, tensiune normală, puls calm și regulat. Somn profund, fără vise excesive. Energie constantă pe parcursul zilei, recuperare rapidă. Ten roz, buze hidratate, limbă rozalie și suplă. Claritate mentală, memorie bună, emoții stabile. Transpirație normală.",
                nutritie: "Dietă echilibrată, bogată în fructe și legume proaspete, proteine slabe, cereale integrale, grăsimi sănătoase. Include alimente roșii (roșii, ardei, pepene roșu) pentru tonifierea inimii. Gustul amar moderat stimulează energia focului. Hidratare optimă.",
                suplimente: "Suplimente de întreținere (dacă e necesar): multivitamine, Omega-3, magneziu. Extract de păducel ca tonic preventiv în sezonul cald.",
                emotional: "Shen-ul este ancorat: bucurie autentică, pace interioară, mulțumire. Capacitate de a dărui și de a primi iubire. Înțelepciune, compasiune, iertare, politețe. Râsul este sincer și potrivit contextului. Creativitate și intuiție dezvoltate.",
                relatiiParinti: "Integrare sănătoasă a iubirii materne și a autorității paterne. Sentimentul de siguranță emoțională și apartenență. Relații armonioase cu părinții sau, cel puțin, pace interioară cu trecutul.",
                terapie: "Menține obiceiurile sănătoase. Cultivă recunoștința și meditația. Practică acte de bunătate. Continuă creșterea personală."
            },
            {
                stare: "Dezechilibru ușor (Hiperfuncție)",
                fiziologic: "Ușoară căldură sau stagnare de Qi în inimă. Simptome: palpitații ocazionale, senzație de căldură în piept, transpirație ușoară în palme, neliniște. Gât uscat, sete moderată. Vârful limbii ușor roșu. Insomnie ușoară (dificultate de adormire din cauza gândurilor).",
                nutritie: "Alimente care răcoresc și liniștesc: castraveți, pepene, pere, mere, spanac, țelină. Cereale ușoare (orz, mei). Ceaiuri de mentă, crizantemă, mușețel. Evită cafeina, alcoolul, alimentele picante și prăjite.",
                suplimente: "Magneziu, extract de păducel, ceai de roiniță (Melissa). Complex de vitamine B. Probiotice.",
                emotional: "Ușoară iritabilitate, tendință la agitație, râs ușor forțat. Dificultăți în relaxare, ușoară anxietate. Nevoia de a controla situațiile.",
                relatiiParinti: "Ușoară tensiune cu autoritatea paternă (figura care impune reguli). Senzația de a fi constrâns, ușoară rebeliune interioară.",
                terapie: "Stretching pentru gât și umeri. Masaj HT-7, PC-6. Respirație 4-7-8 seara. Prioritizarea somnului. Reducerea timpului petrecut pe ecrane."
            },
            {
                stare: "Hiperfuncție moderată",
                fiziologic: "Focul inimii sau flegmă-foc. Palpitații frecvente, senzație de arsură toracică, față roșie, sete intensă. Ulcerații bucale recurente, limbă roșie cu vârf proeminent. Insomnie severă, agitație, transpirații abundente diurne. Urină închisă la culoare. Puls rapid și plin. Tensiune arterială crescută labilă. Comportament impulsiv.",
                nutritie: "Dietă strict răcoritoare: multe legume crude și sucuri verzi, fructe răcoritoare (pepene, pere, grepfrut). Evită total: alcool, cafea, ciocolată, ardei iute, grăsimi saturate, carne roșie. Hidratare cu ceaiuri de păpădie, anghinare, crizantemă. Post intermitent ușor.",
                suplimente: "Extract de păducel, magneziu doze mari, Omega-3. Remedii botanice răcoritoare: bupleurum, gardenie, roiniță. Formule tradiționale (sub îndrumare): Xie Xin Tang sau Dao Chi San.",
                emotional: "Agitație extremă, logoree, râs inadecvat, manie. Iritabilitate explozivă, furie. Neliniște continuă, incapacitate de a sta liniștit. Vise violente sau foc.",
                relatiiParinti: "Conflict deschis cu autoritatea paternă, rebeliune activă, resentimente puternice. Incapacitatea de a accepta ierarhiile, control și limitări.",
                terapie: "Managementul furiei (terapie, sport). Acupresură la HT-8, PC-6, GV-20. Meditație de calmare a minții. Evitarea competiției și a discuțiilor conflictuale. Băi reci la încheieturi."
            },
            {
                stare: "Hiperfuncție severă",
                fiziologic: "Foc extrem sau flegmă-foc care tulbură Shen-ul. Palpitații violente, dureri anginoase, hipertensiune criză. Risc de accident vascular cerebral. Insomnie totală, delir, halucinații, comportament psihotic. Hiperpirexie, transpirații profuze. Limbă roșie-închisă, rigidă. Poate include convulsii și pierderea cunoștinței.",
                nutritie: "Intervenție medicală de urgență; alimentația e strict complementară. Lichide reci, sucuri de legume și fructe diluate, ceaiuri sedative. Evită orice stimulent. Se poate recurge la post temporar sub supraveghere.",
                suplimente: "Numai sub control medical strict. Se pot administra extracte puternic sedative și răcoritoare: valeriană, bupleurum, gardenie, crizantemă, în combinație cu tratament farmacologic.",
                emotional: "Manie severă, furie incontrolabilă, comportament distructiv. Pierderea contactului cu realitatea, iluzii, paranoia. Râs patologic. Absența completă a autocontrolului.",
                relatiiParinti: "Conflict devastator cu principiul patern, respingere totală a autorității. Traumă profundă care duce la o ruptură interioară și la comportamente antisociale.",
                terapie: "Internare psihiatrică și medicală. Acupunctură de sedare (HT-7, PC-6, GV-20, puncte de sângerare la vârful limbii). Medicație. După stabilizare, terapie intensivă pentru traume."
            }
        ];

        const selectInima = document.getElementById('select-inima');
        const barContainer = document.querySelector('.bar-container');
        const arrow = document.getElementById('indicator-inima');
        let isDragging = false;

        function afiseazaInformatii(meridianId, index) {
            let data;
            if (meridianId === 'inima') {
                data = meridianHeartData[index];
            }
            if (!data) return;
            const infoDisplay = document.getElementById(`infoDisplay-${meridianId}`);
            infoDisplay.innerHTML = `
                <h3>Stare: ${data.stare}</h3>
                <p><strong>🧬 Fiziologie & Simptome:</strong><br>${data.fiziologic}</p>
                <p><strong>🥗 Nutriție recomandată:</strong><br>${data.nutritie}</p>
                <p><strong>💊 Suplimente & plante medicinale:</strong><br>${data.suplimente}</p>
                <p><strong>🧠 Stare emoțională & Shen:</strong><br>${data.emotional}</p>
                <p><strong>👪 Relația cu părinții (arhetipuri Yin/Yang):</strong><br>${data.relatiiParinti}</p>
                <p><strong>💆 Terapie & stil de viață:</strong><br>${data.terapie}</p>
            `;
        }

        function updateFromPosition(clientX) {
            const rect = barContainer.getBoundingClientRect();
            let x = clientX - rect.left;
            const width = rect.width;
            x = Math.max(0, Math.min(x, width));
            const totalSegments = 7;
            const segmentWidth = width / totalSegments;
            let index = Math.floor(x / segmentWidth);
            if (index >= totalSegments) index = totalSegments - 1;
            selectInima.value = index;
            const procent = (index * segmentWidth) + (segmentWidth / 2);
            arrow.style.left = `${(procent / width) * 100}%`;
            afiseazaInformatii('inima', index);
        }

        barContainer.addEventListener('click', (e) => {
            if (!isDragging) updateFromPosition(e.clientX);
        });
        barContainer.addEventListener('mousedown', (e) => {
            isDragging = true;
            updateFromPosition(e.clientX);
            e.preventDefault();
        });
        document.addEventListener('mousemove', (e) => {
            if (isDragging) updateFromPosition(e.clientX);
        });
        document.addEventListener('mouseup', () => { isDragging = false; });
        barContainer.addEventListener('touchstart', (e) => {
            isDragging = true;
            updateFromPosition(e.touches[0].clientX);
            e.preventDefault();
        });
        document.addEventListener('touchmove', (e) => {
            if (isDragging) updateFromPosition(e.touches[0].clientX);
        });
        document.addEventListener('touchend', () => { isDragging = false; });

        selectInima.addEventListener('change', (event) => {
            const index = parseInt(event.target.value, 10);
            const totalSegments = 7;
            const segmentWidth = 100 / totalSegments;
            const procent = (index * segmentWidth) + (segmentWidth / 2);
            arrow.style.left = `${procent}%`;
            afiseazaInformatii('inima', index);
        });

        // Inițializare
        const initialIndex = parseInt(selectInima.value, 10);
        const totalSegments = 7;
        const segmentWidth = 100 / totalSegments;
        const procentInit = (initialIndex * segmentWidth) + (segmentWidth / 2);
        arrow.style.left = `${procentInit}%`;
        afiseazaInformatii('inima', initialIndex);

        // Securitate anti-copiere
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'c') e.preventDefault();
            if (e.ctrlKey && e.key === 'u') e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
            if (e.ctrlKey && e.shiftKey && e.key === 'I') e.preventDefault();
            if (e.ctrlKey && e.shiftKey && e.key === 'J') e.preventDefault();
        });
    </script>

</body>
</html>
