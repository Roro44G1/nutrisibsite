backend:
  name: git-gateway
  branch: dev # branch de test - modificarile merg aici, apoi merge manual in main

media_folder: "imagini" # folderul cu imaginile tale
public_folder: "/imagini"

locale: "ro"

collections:
  # -------- ARTICOLE --------
  - name: "articole"
    label: "Articole"
    folder: "blog" # folderul tau cu articole
    create: true
    slug: "{{slug}}"
    extension: "html"
    format: "frontmatter"
    fields:
      - { label: "Titlu", name: "title", widget: "string" }
      - { label: "Data publicării", name: "date", widget: "datetime" }
      - { label: "Imagine principală", name: "thumbnail", widget: "image", required: false }
      - { label: "Descriere scurtă", name: "description", widget: "text", required: false }
      - { label: "Conținut", name: "body", widget: "markdown" }

  # -------- PAGINI STATICE --------
  - name: "pagini"
    label: "Pagini"
    files:
      - label: "Pagina Principală"
        name: "index"
        file: "index.html"
        fields:
          - { label: "Titlu", name: "title", widget: "string" }
          - { label: "Conținut", name: "body", widget: "markdown" }

      - label: "Povestea"
        name: "povestea"
        file: "povestea.html"
        fields:
          - { label: "Titlu", name: "title", widget: "string" }
          - { label: "Conținut", name: "body", widget: "markdown" }

      - label: "Evaluare"
        name: "evaluare"
        file: "evaluare.html"
        fields:
          - { label: "Titlu", name: "title", widget: "string" }
          - { label: "Conținut", name: "body", widget: "markdown" }

      - label: "Biohack"
        name: "biohack"
        file: "biohack.html"
        fields:
          - { label: "Titlu", name: "title", widget: "string" }
          - { label: "Conținut", name: "body", widget: "markdown" }

      - label: "Celos"
        name: "celos"
        file: "celos.html"
        fields:
          - { label: "Titlu", name: "title", widget: "string" }
          - { label: "Conținut", name: "body", widget: "markdown" }

      - label: "Contact"
        name: "contact"
        file: "contact.html"
        fields:
          - { label: "Titlu", name: "title", widget: "string" }
          - { label: "Conținut", name: "body", widget: "markdown" }

      - label: "Jurnal"
        name: "jurnal"
        file: "jurnal.html"
        fields:
          - { label: "Titlu", name: "title", widget: "string" }
          - { label: "Conținut", name: "body", widget: "markdown" }

      - label: "Manifest"
        name: "manifest"
        file: "manifest.html"
        fields:
          - { label: "Titlu", name: "title", widget: "string" }
          - { label: "Conținut", name: "body", widget: "markdown" }

      - label: "Politică de Confidențialitate"
        name: "politica"
        file: "politica.html"
        fields:
          - { label: "Titlu", name: "title", widget: "string" }
          - { label: "Conținut", name: "body", widget: "markdown" }

      - label: "Disclaimer RO"
        name: "disclaimer_ro"
        file: "disclaimer_RO.html"
        fields:
          - { label: "Titlu", name: "title", widget: "string" }
          - { label: "Conținut", name: "body", widget: "markdown" }
